name: Tag PR with linked issue

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  tag-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get PR number and extract issue numbers
        id: extract
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          echo "Checking PR #$PR_NUMBER in $REPO for issue linkage..."
          
          # Fetch PR data
          PR_DATA=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER")
          
          # Extract title and body
          TITLE=$(echo "$PR_DATA" | jq -r '.title // ""')
          BODY=$(echo "$PR_DATA" | jq -r '.body // ""')
          COMBINED="$TITLE\n$BODY"
          
          echo "Title: $TITLE"
          echo "Body: $BODY"
          
          # Extract issue numbers using patterns like #123, closes #123, fixes #456, etc.
          # We'll look for numbers preceded by # and optionally by words like closes, fixes, resolves (case insensitive)
          ISSUE_NUMBERS=$(echo "$COMBINED" | grep -ioE '(closes?|fixes?|resolves?)\s*#?[0-9]+' | grep -ioE '[0-9]+' | sort -u)
          
          # Also catch plain #123 patterns (without keywords)
          PLAIN_NUMBERS=$(echo "$COMBINED" | grep -ioE '#[0-9]+' | grep -ioE '[0-9]+' | sort -u)
          
          # Combine and deduplicate
          ALL_NUMBERS=$(echo -e "$ISSUE_NUMBERS\n$PLAIN_NUMBERS" | sort -u | tr '\n' ' ' | sed 's/ $//')
          
          if [ -z "$ALL_NUMBERS" ]; then
            echo "No issue number found in PR title or description."
            echo "Please link an issue using keywords like 'closes #123', 'fixes #456', or simply '#789'."
            exit 1
          else
            echo "Found issue numbers: $ALL_NUMBERS"
            # Set output for potential use in other steps
            echo "issue_numbers=$ALL_NUMBERS" >> $GITHUB_OUTPUT
          fi

      - name: Process each issue number
        if: steps.extract.outputs.issue_numbers != ''
        run: |
          ISSUE_NUMBERS="${{ steps.extract.outputs.issue_numbers }}"
          REPO="${{ github.repository }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          for ISSUE_NUM in $ISSUE_NUMBERS; do
            LABEL_NAME="issue-$ISSUE_NUM"
            # Check if label exists
            LABEL_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/$REPO/labels/$LABEL_NAME")
            if [ "$LABEL_EXISTS" -ne 200 ]; then
              # Label does not exist, create it
              echo "Creating label: $LABEL_NAME"
              curl -s -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO/labels" \
                -d "{\"name\":\"$LABEL_NAME\",\"color\":\"0052cc\",\"description\":\"Issue #$ISSUE_NUM related\"}" || echo "Failed to create label $LABEL_NAME"
            fi
            # Add label to the PR (issue in GitHub API for PRs is treated as an issue)
            echo "Adding label $LABEL_NAME to PR #$PR_NUMBER"
            curl -s -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/labels" \
              -d "["\"$LABEL_NAME""]" || echo "Failed to add label $LABEL_NAME to PR"
          done